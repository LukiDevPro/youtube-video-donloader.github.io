<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>YouTube Video Downloader</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 40px; }
        .container { background: #fff; padding: 30px; border-radius: 8px; max-width: 400px; margin: auto; box-shadow: 0 2px 8px #ccc; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #e62117; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #b31217; }
    </style>
</head>
<body>
    <div class="container">
        <h2>YouTube Video Downloader</h2>
        <input type="text" id="yturl" placeholder="YouTube Video-URL eingeben">
        <button onclick="download()">Download-Link generieren</button>
        <div id="result"></div>
    </div>
    <script>
        function download() {
            var url = document.getElementById('yturl').value;
            if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
                document.getElementById('result').innerHTML = "<span style='color:red'>Bitte eine gültige YouTube-URL eingeben.</span>";
                return;
            }
            // Beispiel: Weiterleitung an y2mate (Achtung: Werbung/Popups möglich)
            var y2mate = "https://www.y2mate.com/youtube/" + encodeURIComponent(url);
            document.getElementById('result').innerHTML = "<a href='" + y2mate + "' target='_blank'>Zum Download (y2mate.com)</a>";
        }
    </script>
</body>
</html>
